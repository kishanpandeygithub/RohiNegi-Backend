<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
</head>

<body>
    <h1>Chat app</h1>
    <input type="text" placeholder="Enter room Number" style="margin-bottom:  10px;" id="roomNumber">
    <button onclick="joinRoom()">Join</button>
    <div id="messageDisplay"
        style="height: 50vh; width: 50vw; background-color: rgb(108, 108, 218); margin-bottom:  20px;"></div>
    <input type="text" placeholder="Type your message here" id="message"
        style="height: 10vh; width: 50vw; background-color: rgb(34, 233, 123); margin-bottom: 20px;">
    <button onclick="sendMessage()"> Send</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on("connect", () => {
            console.log(socket.id);
        })

        const messageBox = document.getElementById("messageDisplay");
        const messageInput = document.getElementById("message");
        // function sendMessage() {
        //     const msg = messageInput.value;
        //     socket.emit('message', msg);
        //     const element = document.createElement('div');
        //     element.textContent = msg;
        //     element.style.textAlign = 'right';
        //     messageBox.append(element);
        //     messageInput.value = '';
        // }
        
        let roomId =null;
        function sendMessage() {
            const msg = messageInput.value;
            socket.emit('message', {room:roomId , msg:msg });
            const element = document.createElement('div');
            element.textContent = msg;
            element.style.textAlign = 'right';
            messageBox.append(element);
            messageInput.value = '';
        }
        function joinRoom() {
            const roomnum = document.getElementById("roomNumber");
            const room = roomnum.value;
            roomId =room;
            socket.emit('join-room' ,room);
        }


        // how to recive the  message 
        socket.on('new-message', (data) => {
            const element = document.createElement('div');
            element.textContent = data;
            element.style.textAlign = 'left';
            messageBox.append(element);
            messageInput.value = '';
        })
    </script>
</body>

</html>s
